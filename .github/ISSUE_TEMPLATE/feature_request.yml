name: Feature Request
description: Suggest a new check or feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: dropdown
    id: type
    attributes:
      label: Type of request
      options:
        - New GCP check
        - CLI improvement
        - Report improvement
        - New output format
        - New cloud provider
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Why is it needed?
      placeholder: I want this because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Be as specific as possible.
      placeholder: It should...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternatives?
      placeholder: I also considered...
